<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Image unavailable">
  <defs>
    <linearGradient id="vignette" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0c0a" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#0a0c0a" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0a0c0a" stop-opacity="0.75"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#5b6243" stroke-width="0.4" opacity="0.25"/>
    </pattern>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="5"/>
      <feColorMatrix values="0 0 0 0 0.355 0 0 0 0 0.386 0 0 0 0 0.262 0 0 0 0.08 0"/>
    </filter>
  </defs>

  <!-- Base -->
  <rect width="1200" height="900" fill="#111411"/>
  <rect width="1200" height="900" fill="url(#grid)"/>
  <rect width="1200" height="900" filter="url(#noise)"/>

  <!-- Dossier corner marks -->
  <g stroke="#c8a44b" stroke-width="2" fill="none" opacity="0.75">
    <path d="M 40 80 L 40 40 L 80 40"/>
    <path d="M 1120 40 L 1160 40 L 1160 80"/>
    <path d="M 40 820 L 40 860 L 80 860"/>
    <path d="M 1160 820 L 1160 860 L 1120 860"/>
  </g>

  <!-- Faint blueprint aircraft silhouette (original schematic-style, three-view) -->
  <g transform="translate(600 450)" opacity="0.22" stroke="#5b6243" stroke-width="1.4" fill="none">
    <!-- Top-view plan silhouette -->
    <!-- fuselage centreline -->
    <line x1="-230" y1="0" x2="230" y2="0" stroke-dasharray="2 4"/>
    <!-- fuselage outline -->
    <path d="M -220 0 Q -210 -16 -120 -20 L 140 -22 Q 215 -18 230 0 Q 215 18 140 22 L -120 20 Q -210 16 -220 0 Z"/>
    <!-- cockpit canopy -->
    <path d="M 10 -16 Q 45 -30 80 -28 L 110 -22"/>
    <path d="M 10 16  Q 45 30  80 28  L 110 22"/>
    <!-- main wings (elliptical, on purpose — nods to the site's subject) -->
    <path d="M -20 -18 Q 40 -220 200 -230 L 240 -230 Q 160 -70 70 -26 Z"/>
    <path d="M -20 18  Q 40 220  200 230  L 240 230  Q 160 70  70 26  Z"/>
    <!-- tailplane -->
    <path d="M -210 -10 L -260 -80 L -240 -80 L -185 -14 Z"/>
    <path d="M -210 10  L -260 80  L -240 80  L -185 14  Z"/>
    <!-- vertical stabiliser (seen from above as a line) -->
    <line x1="-215" y1="0" x2="-260" y2="0"/>
    <!-- propeller arc -->
    <circle cx="230" cy="0" r="40" stroke-dasharray="1 3"/>
  </g>

  <!-- Framing box around the central stamp -->
  <g stroke="#c8a44b" stroke-width="1" fill="none" opacity="0.55">
    <rect x="340" y="370" width="520" height="160"/>
    <line x1="340" y1="410" x2="860" y2="410"/>
  </g>

  <!-- Top label strip -->
  <text x="600" y="397"
        font-family="'Courier New', ui-monospace, monospace"
        font-size="14" letter-spacing="6"
        fill="#c8a44b" opacity="0.85"
        text-anchor="middle">
    FILE · AIR / VISUAL RECORD
  </text>

  <!-- Main heading -->
  <text x="600" y="460"
        font-family="Georgia, 'Playfair Display', serif"
        font-size="42" font-style="italic" font-weight="500"
        fill="#f6f1e7"
        text-anchor="middle">
    Photograph unavailable
  </text>

  <!-- Subline -->
  <text x="600" y="498"
        font-family="'Courier New', ui-monospace, monospace"
        font-size="13" letter-spacing="4"
        fill="#ede6d5" opacity="0.55"
        text-anchor="middle">
    NO VISUAL RECORD ON FILE · REFERENCE ONLY
  </text>

  <!-- Classification stamp (angled) -->
  <g transform="translate(930 740) rotate(-7)">
    <rect x="-90" y="-22" width="180" height="44" fill="none" stroke="#b5502a" stroke-width="2.5"/>
    <text x="0" y="6"
          font-family="'Arial Black', 'Oswald', sans-serif"
          font-size="18" font-weight="800" letter-spacing="4"
          fill="#b5502a"
          text-anchor="middle">
      UNINDEXED
    </text>
  </g>

  <!-- Bottom-left reference numbers -->
  <g font-family="'Courier New', ui-monospace, monospace"
     font-size="11" letter-spacing="2"
     fill="#ede6d5" opacity="0.4">
    <text x="60" y="815">REF · AV-9999 / XX</text>
    <text x="60" y="832">PLATE · N/A</text>
    <text x="60" y="849">SRC · ARCHIVE</text>
  </g>

  <!-- Vignette on top -->
  <rect width="1200" height="900" fill="url(#vignette)"/>
</svg>
