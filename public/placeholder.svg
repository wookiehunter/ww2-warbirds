<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900">
  <!-- Background -->
  <rect width="1200" height="900" fill="#111411"/>

  <!-- Subtle grid -->
  <g stroke="#5b6243" stroke-width="0.5" opacity="0.18">
    <line x1="0" y1="60"  x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
    <line x1="0" y1="660" x2="1200" y2="660"/>
    <line x1="0" y1="720" x2="1200" y2="720"/>
    <line x1="0" y1="780" x2="1200" y2="780"/>
    <line x1="0" y1="840" x2="1200" y2="840"/>
    <line x1="60"  y1="0" x2="60"  y2="900"/>
    <line x1="120" y1="0" x2="120" y2="900"/>
    <line x1="180" y1="0" x2="180" y2="900"/>
    <line x1="240" y1="0" x2="240" y2="900"/>
    <line x1="300" y1="0" x2="300" y2="900"/>
    <line x1="360" y1="0" x2="360" y2="900"/>
    <line x1="420" y1="0" x2="420" y2="900"/>
    <line x1="480" y1="0" x2="480" y2="900"/>
    <line x1="540" y1="0" x2="540" y2="900"/>
    <line x1="600" y1="0" x2="600" y2="900"/>
    <line x1="660" y1="0" x2="660" y2="900"/>
    <line x1="720" y1="0" x2="720" y2="900"/>
    <line x1="780" y1="0" x2="780" y2="900"/>
    <line x1="840" y1="0" x2="840" y2="900"/>
    <line x1="900" y1="0" x2="900" y2="900"/>
    <line x1="960" y1="0" x2="960" y2="900"/>
    <line x1="1020" y1="0" x2="1020" y2="900"/>
    <line x1="1080" y1="0" x2="1080" y2="900"/>
    <line x1="1140" y1="0" x2="1140" y2="900"/>
  </g>

  <!-- Aircraft silhouette (top-view, pure geometry, no filters) -->
  <g transform="translate(600,420)" fill="none" stroke="#5b6243" stroke-width="1.8" opacity="0.35">
    <!-- Fuselage -->
    <ellipse cx="0" cy="0" rx="18" ry="210"/>
    <!-- Main wings (elliptical) -->
    <ellipse cx="0" cy="-20" rx="280" ry="48" transform="rotate(0)"/>
    <!-- Tailplane left -->
    <path d="M -18 160 Q -90 200 -100 175 Q -60 158 -18 155 Z"/>
    <!-- Tailplane right -->
    <path d="M  18 160 Q  90 200  100 175 Q  60 158  18 155 Z"/>
    <!-- Propeller arc -->
    <path d="M -50 -205 A 50 50 0 0 1 50 -205" stroke-dasharray="6 4"/>
  </g>

  <!-- Dossier corner marks -->
  <g stroke="#c8a44b" stroke-width="2" fill="none" opacity="0.7">
    <path d="M 48 88 L 48 48 L 88 48"/>
    <path d="M 1152 48 L 1152 88 L 1112 48"/>
    <path d="M 48 812 L 48 852 L 88 852"/>
    <path d="M 1152 812 L 1152 852 L 1112 852"/>
  </g>

  <!-- Central framing box -->
  <rect x="330" y="370" width="540" height="170" fill="none" stroke="#c8a44b" stroke-width="1" opacity="0.5"/>
  <line x1="330" y1="410" x2="870" y2="410" stroke="#c8a44b" stroke-width="1" opacity="0.5"/>

  <!-- Label strip in box -->
  <text x="600" y="398"
    font-family="'Courier New', Courier, monospace"
    font-size="13" letter-spacing="5"
    fill="#c8a44b" opacity="0.8"
    text-anchor="middle">FILE · AIR / VISUAL RECORD</text>

  <!-- Main text -->
  <text x="600" y="458"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="40" font-style="italic"
    fill="#f0ebe0"
    text-anchor="middle">Photograph unavailable</text>

  <!-- Subtext -->
  <text x="600" y="498"
    font-family="'Courier New', Courier, monospace"
    font-size="12" letter-spacing="4"
    fill="#ede6d5" opacity="0.45"
    text-anchor="middle">NO VISUAL RECORD ON FILE</text>

  <!-- UNINDEXED stamp, rotated -->
  <g transform="translate(900,740) rotate(-8)">
    <rect x="-82" y="-20" width="164" height="40" fill="none" stroke="#b5502a" stroke-width="2.5"/>
    <text x="0" y="7"
      font-family="'Arial Black', Arial, sans-serif"
      font-size="16" font-weight="900" letter-spacing="4"
      fill="#b5502a"
      text-anchor="middle">UNINDEXED</text>
  </g>

  <!-- Bottom ref text -->
  <text x="60" y="840"
    font-family="'Courier New', Courier, monospace"
    font-size="11" letter-spacing="2"
    fill="#ede6d5" opacity="0.35">REF · AV-9999 / XX · PLATE · N/A · SRC · ARCHIVE</text>
</svg>
